{% extends "base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        {% if product.image %}
            <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.name }}">
        {% else %}
            <div class="bg-secondary text-white text-center py-5 rounded">Rasm qo'yilmagan</div>
        {% endif %}
    </div>
    <div class="col-md-6">
        <h1>{{ product.name }}</h1>
        <h3 class="text-muted"><a href="{% url 'products:product_list_by_category' product.category.slug %}" class="text-decoration-none">{{ product.category.name }}</a></h3>
        <hr>
        <h2 class="text-danger my-3">{{ product.price }} so'm</h2>
        <p class="lead">{{ product.description }}</p>
        
        <button class="btn btn-success btn-lg mt-3">Savatga qo'shish</button>
    </div>
</div>
{% endblock %}
