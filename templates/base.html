<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'products:product_list' %}">Mening Do'konim</a>
        </div>
    </nav>

<div class="container">
    <a class="navbar-brand" href="{% url 'products:product_list' %}">Mening Do'konim</a>
    
    <div class="navbar-nav ms-auto flex-row gap-3">
        <a class="nav-link text-white" href="{% url 'cart:cart_detail' %}">Savat</a>

        {% if user.is_authenticated %}
            <span class="navbar-text text-white fw-bold">Salom, {{ user.first_name }}!</span>
            
            <form action="{% url 'logout' %}" method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger">Chiqish</button>
            </form>
        {% else %}
            <a class="btn btn-sm btn-outline-light" href="{% url 'login' %}">Kirish</a>
            <a class="btn btn-sm btn-warning" href="{% url 'register' %}">Ro'yxatdan o'tish</a>
        {% endif %}
    </div>
</div>

    <footer class="text-center mt-5 py-3 bg-light">
        <p>&copy; 2026 Online Shop. Barcha huquqlar himoyalangan.</p>
    </footer>
</body>
</html>
