<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4 shadow-sm">
    <div class="container py-1">
        <a class="navbar-brand fw-bold text-uppercase tracking-wider text-warning" href="{% url 'products:product_list' %}">🛒 MarketUz</a>
        <form action="{% url 'products:product_list' %}" method="get" class="d-flex mx-auto" style="max-width: 500px; width: 100%;">
            <input class="form-control me-2 bg-secondary text-white border-0" type="search" name="search" placeholder="Mahsulotlarni qidirish..." aria-label="Search" value="{{ query|default:'' }}">
            <button class="btn btn-warning fw-bold" type="submit">Qidirish</button>
        </form>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <a class="btn btn-outline-warning btn-sm d-flex align-items-center gap-1" href="{% url 'cart:cart_detail' %}">
                <span>Savat</span>
                <span class="badge bg-warning text-dark rounded-pill">{{ cart|length }}</span>
            </a>

            {% if user.is_authenticated %}
                <span class="navbar-text text-light me-2">👋 {{ user.first_name }}</span>
                <form action="{% url 'logout' %}" method="post" class="d-inline m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger px-3">Chiqish</button>
                </form>
            {% else %}
                <a class="btn btn-sm btn-link text-white text-decoration-none px-2" href="/auth/login/">Kirish</a>
                <a class="btn btn-sm btn-warning px-3 fw-bold shadow-sm" href="/auth/register/">Ro'yxatdan o'tish</a>
            {% endif %}
        </div>
    </div>
</nav>
</nav>
<div class="container my-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center py-3 bg-light border-top mt-5">
    <div class="container">
        <p class="text-muted m-0">&copy; 2026 MarketUz. Barcha huquqlar himoyalangan.</p>
    </div>
</footer>

</body>
</html>
